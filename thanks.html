<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5LH020EWQ0"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-5LH020EWQ0');
    gtag('event', 'contact_form_thanks');
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>お問い合わせありがとうございます | CTO's Pathfinder</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .thanks-section {
      min-height: 100vh;
      background: var(--color-bg-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .thanks-bg-gradient {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200, 165, 14, 0.08) 0%, transparent 60%);
    }
    .thanks-content {
      position: relative;
      z-index: 1;
      padding: 40px;
    }
    .thanks-icon {
      font-size: 3rem;
      margin-bottom: 32px;
    }
    .thanks-en {
      font-family: var(--font-en);
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -0.03em;
      margin-bottom: 24px;
    }
    .thanks-en .accent { color: var(--color-accent); }
    .thanks-jp {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.6);
      line-height: 2;
      margin-bottom: 48px;
    }
    .thanks-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--color-accent);
      color: var(--color-bg-dark);
      font-size: 0.9rem;
      font-weight: 700;
      font-family: var(--font-jp);
      padding: 16px 40px;
      border-radius: 100px;
      transition: var(--transition);
    }
    .thanks-back:hover {
      background: var(--color-accent-light);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(200, 165, 14, 0.3);
    }
  </style>
</head>
<body>
  <section class="thanks-section">
    <div class="thanks-bg-gradient"></div>
    <div class="thanks-content">
      <div class="thanks-icon">✦</div>
      <div class="thanks-en">Thank You<span class="accent">.</span></div>
      <p class="thanks-jp">
        お問い合わせいただきありがとうございます。<br />
        内容を確認のうえ、3営業日以内にご連絡いたします。
      </p>
      <a href="/" class="thanks-back">← トップに戻る</a>
    </div>
  </section>
</body>
</html>
